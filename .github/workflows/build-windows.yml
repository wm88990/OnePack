name: Build Windows Portable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build

      - name: Package portable zip
        shell: cmd
        run: |
          mkdir OnePack
          copy src-tauri\target\release\OnePack.exe OnePack\
          copy config.yaml OnePack\
          mkdir OnePack\packages
          mkdir OnePack\apps
          echo OnePack - 放置安装包到此目录 > OnePack\packages\README.txt
          echo. >> OnePack\packages\README.txt
          echo 支持格式: >> OnePack\packages\README.txt
          echo   .exe  - 静默安装程序 >> OnePack\packages\README.txt
          echo   .zip  - 绿色软件压缩包 >> OnePack\packages\README.txt
          echo OnePack - 绿色软件解压目录 > OnePack\apps\README.txt
          echo. >> OnePack\apps\README.txt
          echo 绿色软件将自动解压到此目录下对应子文件夹 >> OnePack\apps\README.txt
          powershell -Command "Compress-Archive -Path OnePack -DestinationPath OnePack-Portable.zip"

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: OnePack-Portable
          path: OnePack-Portable.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: 'OnePack ${{ github.ref_name }}'
          body: |
            **OnePack 绿色版** - 下载解压即可使用
            
            ## 使用方法
            1. 下载 `OnePack-Portable.zip`
            2. 解压到任意目录
            3. 将软件安装包放入 `packages/` 目录
            4. 编辑 `config.yaml` 配置软件信息（首次运行会自动生成默认配置）
            5. 运行 `OnePack.exe`
          draft: true
          files: OnePack-Portable.zip
