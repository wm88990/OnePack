packages:
  - id: "7zip"
    name: "7-Zip"
    icon: "\uD83D\uDDCE\uFE0F"
    category: system
    description: "开源压缩解压工具，支持多种格式"
    version: "24.09"
    size: "1.5 MB"
    source:
      type: local
      path: "7z2409-x64.exe"
      hash_sha256: ""
    install:
      type: exe
      silent_args: "/S"

  - id: "winrar"
    name: "WinRAR"
    icon: "\uD83D\uDCDA"
    category: system
    description: "强大的压缩文件管理器"
    version: "6.24"
    size: "3.4 MB"
    source:
      type: local
      path: "WinRAR-x64.exe"
      hash_sha256: ""
    install:
      type: exe
      silent_args: "/S"

  - id: "huorong"
    name: "火绒安全"
    icon: "\uD83D\uDEE1\uFE0F"
    category: system
    description: "轻量级安全防护软件"
    version: "5.0.82"
    size: "32 MB"
    source:
      type: local
      path: "Huorong.exe"
      hash_sha256: ""
    install:
      type: exe
      silent_args: "/S"

  - id: "chrome"
    name: "Google Chrome"
    icon: "\uD83C\uDF10"
    category: browser
    description: "谷歌浏览器"
    version: "131.0"
    size: "95 MB"
    source:
      type: local
      path: "ChromeSetup.exe"
      hash_sha256: ""
    install:
      type: exe
      silent_args: "/silent /install"

  - id: "wechat"
