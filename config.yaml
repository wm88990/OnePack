    version: "7.6"
    size: "195 MB"
    source:
      type: local
      path: "DingTalk.exe"
      hash_sha256: ""
    install:
      type: exe
      silent_args: "/S"

  - id: "vscode"
    name: "VS Code"
    icon: "\uD83D\uDCBB"
