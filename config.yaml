    size: "280 MB"
    source:
      type: local
      path: "WeChatSetup.exe"
      hash_sha256: ""
    install:
      type: exe
      silent_args: "/S /AutoInstall"

  - id: "qq"
    name: "QQ"
    icon: "\uD83D\uDC1F"
